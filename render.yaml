# render.yaml — place in repo root for one-click Render deploy
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: otohana-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
