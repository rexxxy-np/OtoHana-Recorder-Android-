workflows:
  android-debug:
    name: OtoHana Debug Build
    max_build_duration: 30
    environment:
      java: 17
    scripts:
      - name: Install Gradle
        script: |
          brew install gradle || true
      - name: Build Debug APK
        script: |
          cd android
          gradle assembleDebug
    artifacts:
      - android/app/build/outputs/apk/debug/*.apk
