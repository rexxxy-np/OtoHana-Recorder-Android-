workflows:
  android-debug:
    name: OtoHana Debug Build
    max_build_duration: 30
    environment:
      java: 17
    scripts:
      - name: Install Gradle 8.2
        script: |
          brew install gradle@8 || true
          export PATH="/usr/local/opt/gradle@8/bin:$PATH"
      - name: Build Debug APK
        script: |
          export PATH="/usr/local/opt/gradle@8/bin:$PATH"
          cd android
          gradle assembleDebug
    artifacts:
      - android/app/build/outputs/apk/debug/*.apk
